<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400..800&family=Instrument+Serif&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; overflow: hidden; }
      body {
        position: relative;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: 'Bricolage Grotesque', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 56px 72px 60px;
      }
      .bg-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.5;
        z-index: -2;
      }
      .bg-overlay {
        position: absolute;
        inset: 0;
        z-index: -1;
        background: linear-gradient(
          180deg,
          rgba(10, 10, 10, 0.72) 0%,
          rgba(10, 10, 10, 0.5) 50%,
          rgba(10, 10, 10, 0.92) 100%
        );
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .wordmark {
        font-weight: 800;
        font-size: 36px;
        letter-spacing: -0.035em;
        font-variation-settings: "wdth" 92;
        line-height: 1;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ff5722;
      }
      .caps {
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 13px;
        font-weight: 600;
      }
      .chapter {
        display: flex;
        align-items: center;
        gap: 14px;
        color: rgba(255, 255, 255, 0.6);
      }
      .chapter .line {
        width: 120px;
        height: 1px;
        background: rgba(255, 255, 255, 0.22);
      }
      .headline {
        font-weight: 800;
        font-size: 132px;
        letter-spacing: -0.05em;
        line-height: 0.92;
        font-variation-settings: "wdth" 92;
        margin-bottom: 22px;
      }
      .italic {
        font-family: 'Instrument Serif', serif;
        font-weight: 400;
        font-style: italic;
        letter-spacing: -0.015em;
      }
      .tagline {
        color: rgba(255, 255, 255, 0.72);
        font-size: 22px;
        max-width: 720px;
        line-height: 1.42;
      }
      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        color: #ff7a4a;
      }
    </style>
  </head>
  <body>
    <img
      class="bg-img"
      src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1800&q=80&auto=format&fit=crop"
    />
    <div class="bg-overlay"></div>

    <div class="top">
      <div class="brand">
        <span class="wordmark">lift<span style="color: #ff5722">gauge</span></span>
        <span class="dot"></span>
      </div>
      <div class="caps chapter">
        <span>EST. 2025 · LIFTGAUGE / 01</span>
        <span class="line"></span>
      </div>
    </div>

    <div>
      <h1 class="headline">
        Track every rep.<br />
        <span class="italic">See every gain.</span>
      </h1>
      <p class="tagline">
        The honest training log for lifters who care about the numbers. Log sets in seconds, watch the graph climb.
      </p>
    </div>

    <div class="bottom">
      <div class="caps" style="color: rgba(255, 255, 255, 0.55)">NO CARD · FREE FOREVER</div>
      <div class="caps url">ENTER THE LOG →</div>
    </div>
  </body>
</html>
